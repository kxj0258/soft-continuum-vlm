# TODO(feagine-4d-action): Keep this as the existing low-level controller schema.
# Expected future top-level input is [dx, dy, dz, gripper_control], and the
# integration path is task/policy -> FeagineActionAdapter -> {section_angles,
# grip_command, grasper_rotation} before the runtime env consumes the command.
method:
  name: scripted_pcc_ik
  controller: pcc_ik
  safety_projector: enabled
  action_space:
    feagine_controls:
      section_angles:
        type: absolute_theta_phi_pairs
        units: radians
      grip_command:
        range: [0.0, 1.0]
        semantics: feagine_open_to_closed
      grasper_rotation:
        units: radians
